program: src/train.py

method: grid

metric:
  name: val_f1
  goal: maximize

parameters:

  activation: 
    value: "tanh"

  batch_size:
    value: 32

  epochs:
    value: 50

  optimizer:
    value: "rmsprop"

  learning_rate:
    value: 0.001

  weight_init: 
    values: ["zero", "xavier"]

  hidden_size:
    value: "128,128,128"

  weight_decay:
    value: 0.0001

  logging_options:
    value: "9"