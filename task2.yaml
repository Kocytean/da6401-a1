program: src/train.py

method: bayes

metric:
  name: val_f1
  goal: maximize

parameters:

  activation:
    values: ["relu", "tanh", "sigmoid"]

  batch_size:
    values: [32, 64, 128]

  epochs:
    value: 10

  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]

  learning_rate:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01

  weight_init:
    value: "xavier"

  hidden_size:
    values:
      - "128"
      - "256"
      - "128,64"
      - "256,128"

  weight_decay:
    values: [0.0, 0.0001]

  logging_options:
    value: '7'